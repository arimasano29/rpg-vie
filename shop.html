<title>Forgeron — RPG de Vie</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;
  --border:#2a2a3a;--border-active:#9b1a1a;
  --red:#9b1a1a;--red-light:#c0392b;--red-glow:#e74c3c;
  --xp:#7c4dff;--xp-light:#9c6fff;
  --bronze:#cd7f32;--silver:#c0c0c0;--gold:#ffd700;
  --text:#e8e8f0;--text2:#888899;
  --green:#2d6a2d;--green-light:#4a9e4a;
  --red:#8b1a1a;--red-light:#c0392b;
  --common:#888899;--rare:#4a90d9;--epic:#9b59b6;--legendary:#f39c12;--transcendent:#e74c3c;
}
body{background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;font-family:'Rajdhani',sans-serif;font-weight:500;min-height:100vh;padding-bottom:80px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}

/* FOND FLOUTÉ */
body::before{content:'';position:fixed;inset:0;background:url('bg4.jpg') center/cover no-repeat;filter:blur(18px) brightness(0.18);z-index:-1;transform:scale(1.05)}

.nav-desktop{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px;background:rgba(10,10,15,0.95);border-bottom:1px solid #1a0a0a;position:sticky;backdrop-filter:blur(8px);top:0;z-index:100}
.nav-logo{font-family:'Cinzel',serif;font-size:15px;color:var(--red-glow);letter-spacing:2px}
.nav-links{display:flex;gap:2rem}
.nav-links a{color:var(--text2);text-decoration:none;font-size:14px;letter-spacing:1px;text-transform:uppercase;transition:color 0.2s;padding-bottom:2px}
.nav-links a:hover,.nav-links a.active{color:var(--red-glow);border-bottom:1px solid var(--red)}

.nav-mobile{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(10,10,15,0.95);border-top:1px solid #1a0a0a;z-index:100;backdrop-filter:blur(8px);justify-content:space-around;align-items:center}
.nav-mobile a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);text-decoration:none;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.2s}
.nav-mobile a.active,.nav-mobile a:hover{color:var(--red-glow)}
.nav-icon{font-size:16px}

main{max-width:960px;margin:0 auto;padding:1.25rem 1rem}

.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.page-title{font-family:'Cinzel',serif;font-size:18px;color:var(--text);letter-spacing:1px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text2)}

.currency-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cur-item{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;display:flex;align-items:center;gap:6px}
.cur-dot{width:8px;height:8px;border-radius:50%}
.cur-val{font-family:'Cinzel',serif;font-size:14px}
.cur-label{font-size:10px;color:var(--text2);letter-spacing:1px}

.equipped-section{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:1rem;position:relative;overflow:hidden}
.equipped-section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.section-label{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:14px}
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.slot{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;cursor:pointer;transition:border-color 0.2s;position:relative;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.slot:hover{border-color:var(--border-active)}
.slot.equipped{border-color:var(--gold)}
.slot-icon{font-size:20px}
.slot-name{font-size:9px;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase}
.slot-item-name{font-size:10px;color:var(--gold);line-height:1.2;text-align:center}
.slot-bonus{font-size:9px;color:var(--green-light)}
.unequip-btn{position:absolute;top:3px;right:3px;background:none;border:none;color:var(--red-light);cursor:pointer;font-size:10px;padding:1px 3px}

.tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.tab{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 14px;color:var(--text2);font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all 0.2s}
.tab:hover{border-color:var(--border-active);color:var(--red-glow)}
.tab.active{background:var(--bg2);border-color:var(--border-active);color:var(--red-glow)}

.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}

.item-card{background:var(--bg2);border-radius:8px;padding:10px;text-align:center;position:relative;overflow:hidden;transition:transform 0.15s,border-color 0.2s;cursor:pointer}
.item-card:hover{transform:translateY(-2px)}
.item-card.owned{opacity:1}
.item-card.equipped-item{box-shadow:0 0 0 1px var(--gold)}

.rarity-common{border:1px solid var(--common)}
.rarity-rare{border:1px solid var(--rare)}
.rarity-epic{border:1px solid var(--epic)}
.rarity-legendary{border:1px solid var(--legendary)}
.rarity-transcendent{border:1px solid var(--transcendent)}

.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.rarity-common::before{background:var(--common)}
.rarity-rare::before{background:var(--rare)}
.rarity-epic::before{background:var(--epic)}
.rarity-legendary::before{background:linear-gradient(90deg,transparent,var(--legendary),transparent)}
.rarity-transcendent::before{background:linear-gradient(90deg,transparent,var(--transcendent),transparent)}

.item-img{width:52px;height:52px;object-fit:contain;margin:0 auto 6px;display:block}
.item-name{font-family:'Cinzel',serif;font-size:10px;line-height:1.3;margin-bottom:4px;min-height:28px;display:flex;align-items:center;justify-content:center}
.item-bonus{font-size:9px;color:var(--green-light);margin-bottom:6px;min-height:14px}
.item-price{font-size:10px;margin-bottom:6px}
.item-rarity{font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}

.buy-btn{width:100%;background:none;border:1px solid var(--border);border-radius:4px;padding:4px;color:var(--text2);font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.buy-btn:hover{border-color:var(--gold);color:var(--gold)}
.buy-btn.owned-btn{border-color:var(--red);color:var(--red-glow)}
.buy-btn.owned-btn:hover{border-color:var(--gold);color:var(--gold)}
.buy-btn.equipped-btn{border-color:var(--gold);color:var(--gold)}
.buy-btn:disabled{opacity:0.4;cursor:not-allowed}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border-active);border-radius:6px;padding:8px 18px;font-size:12px;color:var(--text);z-index:400;animation:toastIn 0.3s ease,toastOut 0.4s ease 1.8s forwards;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

@media(max-width:600px){
  .nav-desktop{display:none}
  .nav-mobile{display:flex}
  .items-grid{grid-template-columns:repeat(2,1fr)}
  .slots-grid{grid-template-columns:repeat(4,1fr)}
}
</style>

const RARITY_LABELS={common:"Commun",rare:"Rare",epic:"Épique",legendary:"Légendaire",transcendent:"Transcendant"};
const RARITY_COLORS={common:"var(--common)",rare:"var(--rare)",epic:"var(--epic)",legendary:"var(--legendary)",transcendent:"var(--transcendent)"};

const SLOT_TABS=[
  {id:"all",label:"Tout"},
  {id:"head",label:"Tête"},
  {id:"body",label:"Corps"},
  {id:"weapon1",label:"Arme 1"},
  {id:"weapon2",label:"Arme 2"},
  {id:"feet",label:"Pieds"},
  {id:"cape",label:"Cape"},
  {id:"amulet",label:"Amulette"},
  {id:"ring1",label:"Anneau 1"},
  {id:"ring2",label:"Anneau 2"},
];

let currentTab="all";

function loadBronze(){return parseInt(localStorage.getItem('total_bronze')||'0');}
function saveBronze(b){localStorage.setItem('total_bronze',Math.max(0,b));}
function loadOwned(){try{const d=localStorage.getItem('owned_items');return d?new Set(JSON.parse(d)):new Set();}catch(e){return new Set();}}
function saveOwned(s){localStorage.setItem('owned_items',JSON.stringify([...s]));}
function loadEquipped(){try{const d=localStorage.getItem('equipped_items');return d?JSON.parse(d):{};}catch(e){return {};}}
function saveEquipped(e){localStorage.setItem('equipped_items',JSON.stringify(e));}

function getPrice(item){
  if(item.currency==='bronze')return item.price;
  if(item.currency==='silver')return item.price*100;
  if(item.currency==='gold')return item.price*10000;
  return item.price;
}

function formatPrice(item){
  if(item.currency==='bronze')return`<span style="color:var(--bronze)">${item.price} 🟤</span>`;
  if(item.currency==='silver')return`<span style="color:var(--silver)">${item.price} Argent</span>`;
  if(item.currency==='gold')return`<span style="color:var(--gold)">${item.price} Or</span>`;
  return item.price;
}

function showToast(msg,color='var(--blue-light)'){
  const t=document.createElement('div');
  t.className='toast';
  t.style.color=color;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2400);
}

function buyItem(id){
  const item=ITEMS.find(x=>x.id===id);
  if(!item)return;
  const owned=loadOwned();
  if(owned.has(id)){equipItem(id);return;}
  const cost=getPrice(item);
  const bronze=loadBronze();
  if(bronze<cost){showToast('Pas assez de Bronze !','var(--red-light)');return;}
  saveBronze(bronze-cost);
  owned.add(id);
  saveOwned(owned);
  equipItem(id);
  showToast('✓ '+item.name+' acheté et équipé !','var(--gold)');
  // Journal logging
  try{
    const entries=JSON.parse(localStorage.getItem('journal_entries')||'[]');
    entries.push({id:Date.now().toString(),type:'shop',title:'Achat : '+item.name,detail:item.bonus,cost:cost,ts:Date.now()});
    localStorage.setItem('journal_entries',JSON.stringify(entries));
  }catch(e){}
  render();
}

function equipItem(id){
  const item=ITEMS.find(x=>x.id===id);
  if(!item)return;
  const owned=loadOwned();
  if(!owned.has(id))return;
  const equipped=loadEquipped();
  if(equipped[item.slot]===id){return;}
  equipped[item.slot]=id;
  saveEquipped(equipped);
  showToast('⚔ '+item.name+' équipé','var(--blue-light)');
  render();
}

function unequipSlot(slot){
  const equipped=loadEquipped();
  delete equipped[slot];
  saveEquipped(equipped);
  render();
}

function renderCurrency(){
  const bronze=loadBronze();
  const or=Math.floor(bronze/10000);
  const argent=Math.floor((bronze%10000)/100);
  const bronzeRest=bronze%100;
  document.getElementById('currency-bar').innerHTML=`
    <div class="cur-item"><div class="cur-dot" style="background:var(--bronze)"></div><div><div class="cur-val" style="color:var(--bronze)">${bronzeRest}</div><div class="cur-label">Bronze</div></div></div>
    <div class="cur-item"><div class="cur-dot" style="background:var(--silver)"></div><div><div class="cur-val" style="color:var(--silver)">${argent}</div><div class="cur-label">Argent</div></div></div>
    <div class="cur-item"><div class="cur-dot" style="background:var(--gold)"></div><div><div class="cur-val" style="color:var(--gold)">${or}</div><div class="cur-label">Or</div></div></div>
    <div class="cur-item"><div><div class="cur-val" style="color:var(--text2)">${bronze}</div><div class="cur-label">Total Bronze</div></div></div>
  `;
}

function renderSlots(){
  const equipped=loadEquipped();
  const grid=document.getElementById('slots-grid');
  grid.innerHTML='';
  SLOTS.forEach(s=>{
    const equippedId=equipped[s.id];
    const item=equippedId?ITEMS.find(x=>x.id===equippedId):null;
    const div=document.createElement('div');
    div.className='slot'+(item?' equipped':'');
    if(item){
      div.innerHTML=`
        <button class="unequip-btn" onclick="event.stopPropagation();unequipSlot('${s.id}')">✕</button>
        <img src="${item.img}" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display='none'">
        <div class="slot-item-name">${item.name}</div>
        <div class="slot-bonus">${item.bonus}</div>
      `;
    } else {
      div.innerHTML=`<div class="slot-icon">${s.icon}</div><div class="slot-name">${s.name}</div><div style="font-size:9px;color:var(--border-active)">Vide</div>`;
    }
    div.onclick=()=>{if(!item){currentTab=s.id;renderTabs();renderItems();}};
    grid.appendChild(div);
  });
}

function renderTabs(){
  const tabs=document.getElementById('tabs');
  tabs.innerHTML='';
  SLOT_TABS.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tab'+(currentTab===t.id?' active':'');
    btn.textContent=t.label;
    btn.onclick=()=>{currentTab=t.id;renderTabs();renderItems();};
    tabs.appendChild(btn);
  });
}

function renderItems(){
  const owned=loadOwned();
  const equipped=loadEquipped();
  const list=currentTab==='all'?ITEMS:ITEMS.filter(x=>x.slot===currentTab);
  const grid=document.getElementById('items-grid');
  grid.innerHTML='';
  list.forEach(item=>{
    const isOwned=owned.has(item.id);
    const isEquipped=Object.values(equipped).includes(item.id);
    const card=document.createElement('div');
    card.className=`item-card rarity-${item.rarity}`+(isEquipped?' equipped-item':'');
    let btnText=isEquipped?'Équipé':isOwned?'Équiper':'Acheter';
    let btnClass=isEquipped?'equipped-btn':isOwned?'owned-btn':'';
    card.innerHTML=`
      <img class="item-img" src="${item.img}" alt="${item.name}" onerror="this.style.opacity='0.2'">
      <div class="item-name" style="color:${RARITY_COLORS[item.rarity]}">${item.name}</div>
      <div class="item-bonus">${item.bonus}</div>
      <div class="item-price">${formatPrice(item)}</div>
      <div class="item-rarity" style="color:${RARITY_COLORS[item.rarity]}">${RARITY_LABELS[item.rarity]}</div>
      <button class="buy-btn ${btnClass}" onclick="buyItem(${item.id})">${btnText}</button>
    `;
    grid.appendChild(card);
  });
}

function render(){
  renderCurrency();
  renderSlots();
  renderTabs();
  renderItems();
}

render();
</script>
